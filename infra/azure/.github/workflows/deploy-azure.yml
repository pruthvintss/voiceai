name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [dev, staging, prod]

# Cancel any in-progress deployment for the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a running deploy — wait for it

env:
  AZURE_RESOURCE_GROUP: rg-voiceai-${{ github.event.inputs.environment || 'prod' }}
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}

# Required for OIDC (passwordless Azure auth)
permissions:
  id-token: write
  contents: read

jobs:
  # ── Detect which apps changed ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'infra/azure/bicep/**'
            web:
              - 'apps/web/**'
            landing:
              - 'apps/landing/**'

  # ── Build & push API image ─────────────────────────────────────────────────
  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/voiceai-api:latest
            ${{ env.REGISTRY }}/voiceai-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/voiceai-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/voiceai-api:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ── Build & push Web image ─────────────────────────────────────────────────
  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/voiceai-web:latest
            ${{ env.REGISTRY }}/voiceai-web:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/voiceai-web:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/voiceai-web:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.ROOT_DOMAIN }}
            NEXT_PUBLIC_WS_URL=wss://api.${{ secrets.ROOT_DOMAIN }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ── Deploy landing to Azure Static Web Apps ────────────────────────────────
  deploy-landing:
    needs: changes
    if: needs.changes.outputs.landing == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/landing/package-lock.json

      - name: Install dependencies
        working-directory: apps/landing
        run: npm ci

      - name: Build landing site
        working-directory: apps/landing
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/landing
          output_location: out
          skip_app_build: true

  # ── Deploy API, Celery Worker, Celery Beat ─────────────────────────────────
  deploy-api:
    needs: build-api
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API Container App
        run: |
          az containerapp update \
            --name ca-voiceai-api-${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/voiceai-api:${{ github.sha }}

      - name: Update Celery Worker
        run: |
          az containerapp update \
            --name ca-voiceai-celery-worker-${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/voiceai-api:${{ github.sha }}

      - name: Update Celery Beat
        run: |
          az containerapp update \
            --name ca-voiceai-celery-beat-${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/voiceai-api:${{ github.sha }}

      - name: Run database migrations
        run: |
          echo "Starting migration job..."
          JOB_EXECUTION=$(az containerapp job start \
            --name ca-voiceai-migrate-${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv)
          echo "Job execution: $JOB_EXECUTION"

          echo "Waiting for migration to complete..."
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name ca-voiceai-migrate-${{ env.ENVIRONMENT }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --job-execution-name "$JOB_EXECUTION" \
              --query "properties.status" -o tsv 2>/dev/null || echo "Running")

            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "Migration completed successfully"
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "Migration failed — check Container Apps job logs"
              exit 1
            fi

            sleep 10
          done

      - name: Verify API health
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              https://api.${{ secrets.ROOT_DOMAIN }}/health || echo "000")

            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi

            sleep 15
          done

          echo "API health check timed out after 3 minutes"
          exit 1

  # ── Deploy Web dashboard ───────────────────────────────────────────────────
  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Web Container App
        run: |
          az containerapp update \
            --name ca-voiceai-web-${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/voiceai-web:${{ github.sha }}

      - name: Verify Web health
        run: |
          echo "Waiting for Web app to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              https://app.${{ secrets.ROOT_DOMAIN }} || echo "000")

            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
              echo "Web app is healthy"
              exit 0
            fi

            sleep 15
          done

          echo "Web health check timed out after 3 minutes"
          exit 1

  # ── Deployment summary ─────────────────────────────────────────────────────
  notify:
    needs: [deploy-api, deploy-web, deploy-landing]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarise deployment result
        run: |
          API_RESULT="${{ needs.deploy-api.result }}"
          WEB_RESULT="${{ needs.deploy-web.result }}"
          LANDING_RESULT="${{ needs.deploy-landing.result }}"

          echo "=== Deployment Summary ==="
          echo "API:     $API_RESULT"
          echo "Web:     $WEB_RESULT"
          echo "Landing: $LANDING_RESULT"
          echo "SHA:     ${{ github.sha }}"
          echo "Env:     ${{ env.ENVIRONMENT }}"

          # Fail the summary job if any deploy job failed (skipped is OK)
          if [ "$API_RESULT" = "failure" ] || \
             [ "$WEB_RESULT" = "failure" ] || \
             [ "$LANDING_RESULT" = "failure" ]; then
            echo ""
            echo "One or more deployments FAILED. Check the individual job logs above."
            exit 1
          fi

          echo ""
          echo "All deployments succeeded (or were skipped — no changes detected)."
