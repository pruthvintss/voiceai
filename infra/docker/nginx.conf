user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;  # don't leak nginx version

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    # Separate zones for different endpoint sensitivity
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ws_connect:10m  rate=20r/m;

    # ─── Upstream Definitions ─────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream web_frontend {
        server web:3000;
        keepalive 16;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    # Uncomment in production when TLS is configured.
    # server {
    #     listen 80;
    #     server_name yourdomain.com www.yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ─── Main Server Block ────────────────────────────────────────────────────
    server {
        # In production, change to: listen 443 ssl http2;
        listen 80;
        server_name _;

        # ── TLS (uncomment for production) ────────────────────────────────────
        # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers off;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_stapling        on;
        # ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"              always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(self), geolocation=()" always;
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # enable once HTTPS is confirmed

        # ── Client Limits ──────────────────────────────────────────────────────
        client_max_body_size     10m;
        client_body_buffer_size  128k;
        client_header_timeout    10s;
        client_body_timeout      30s;
        send_timeout             30s;

        # ── WebSocket: /ws/ → FastAPI ──────────────────────────────────────────
        location /ws/ {
            limit_req zone=ws_connect burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Long timeouts for persistent voice connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;
        }

        # ── Auth endpoints: stricter rate limit ───────────────────────────────
        location ~ ^/api/(auth|token) {
            limit_req zone=api_auth burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── REST API: /api/ → FastAPI ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;

            # Pass through server-sent events without buffering
            proxy_buffering off;
        }

        # ── Static assets: long cache ─────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass         http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Next.js: everything else ──────────────────────────────────────────
        location / {
            proxy_pass         http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    30s;
            proxy_connect_timeout 10s;
        }

        # ── Health check endpoint (bypass auth/rate limits) ───────────────────
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
