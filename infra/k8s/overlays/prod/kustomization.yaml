apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: voiceai

resources:
  - ../../  # base

# Production patches: more replicas, higher resource limits
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: api

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: web

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      kind: Deployment
      name: celery-worker

  # Larger resource limits in production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
    target:
      kind: Deployment
      name: api

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
    target:
      kind: Deployment
      name: celery-worker

  # Wider HPA range for prod traffic
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: api-hpa

  # Larger PVC for prod
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "50Gi"
    target:
      kind: PersistentVolumeClaim
      name: postgres-pvc

  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "10Gi"
    target:
      kind: PersistentVolumeClaim
      name: redis-pvc

images:
  - name: ghcr.io/your-org/voiceai-api
    # Pin to an explicit digest in production; CI pipeline sets this
    newTag: "${IMAGE_TAG}"
  - name: ghcr.io/your-org/voiceai-web
    newTag: "${IMAGE_TAG}"
