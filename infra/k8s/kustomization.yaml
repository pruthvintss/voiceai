apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: voiceai

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - celery.yaml
  - web.yaml
  - ingress.yaml
  - jobs.yaml

commonLabels:
  app.kubernetes.io/part-of: voiceai-platform
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/your-org/voiceai-api
    newTag: latest
  - name: ghcr.io/your-org/voiceai-web
    newTag: latest
