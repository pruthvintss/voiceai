# WARNING: Do NOT commit real secrets to version control.
# In production, use one of:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator backed by AWS Secrets Manager / Vault
#   - SOPS-encrypted files
#
# This file is a template showing required keys.
# Values are base64(placeholder) — replace before applying.
#
# Generate base64: echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: voiceai-secrets
  namespace: voiceai
  annotations:
    # Remove this annotation after applying real values
    voiceai/template: "true"
type: Opaque
data:
  # Database password: base64("changeme_in_production")
  DATABASE_PASSWORD: Y2hhbmdlbWVfaW5fcHJvZHVjdGlvbg==

  # Full async DATABASE_URL
  DATABASE_URL: cG9zdGdyZXNxbCthc3luY3BnOi8vdm9pY2VhaTpjaGFuZ2VtZV9pbl9wcm9kdWN0aW9uQHBvc3RncmVzOjU0MzIvdm9pY2VhaQ==

  # Secret key (min 32 chars) — generate with: python scripts/generate-keys.py
  SECRET_KEY: eW91ci1zZWNyZXQta2V5LW1pbi0zMi1jaGFycy1jaGFuZ2UtdGhpcw==

  # Fernet encryption key (44 chars base64) — generate with: python scripts/generate-keys.py
  ENCRYPTION_KEY: eW91ci1mZXJuZXQta2V5LTQ0LWNoYXJzLWJhc2U2NC1jaGFuZ2UtdGhpcw==

  # AI provider keys
  ANTHROPIC_API_KEY: ""
  OPENAI_DEFAULT_API_KEY: ""
  GOOGLE_DEFAULT_API_KEY: ""

  # AWS credentials (if using S3)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # SMTP auth
  SMTP_USER: ""
  SMTP_PASSWORD: ""

  # Monitoring
  SENTRY_DSN: ""
