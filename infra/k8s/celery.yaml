---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: voiceai
  labels:
    app: celery-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      terminationGracePeriodSeconds: 60  # let running tasks finish
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/voiceai-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.worker.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,calls,memory
          envFrom:
            - configMapRef:
                name: voiceai-config
            - secretRef:
                name: voiceai-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.worker.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

---
# Celery Beat — exactly 1 replica, never scale this
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: voiceai
  labels:
    app: celery-beat
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  strategy:
    # Recreate instead of RollingUpdate prevents two beat instances running simultaneously
    type: Recreate
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: celery-beat
          image: ghcr.io/your-org/voiceai-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.worker.celery_app
            - beat
            - --loglevel=info
            - --scheduler
            - redbeat.RedBeatScheduler
          envFrom:
            - configMapRef:
                name: voiceai-config
            - secretRef:
                name: voiceai-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
