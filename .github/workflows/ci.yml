name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # cancel superseded runs on the same branch/PR

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── Python: Lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff check
        run: ruff check apps/api --output-format=github

      - name: Run ruff format check
        run: ruff format apps/api --check

  # ─── Python: Type Check ──────────────────────────────────────────────────────
  typecheck-python:
    name: Type Check Python (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt -r apps/api/requirements-dev.txt

      - name: Run mypy
        run: mypy apps/api/app --ignore-missing-imports
        working-directory: .

  # ─── Python: Tests ───────────────────────────────────────────────────────────
  test-python:
    name: Test Python (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voiceai_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: voiceai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://voiceai_test:testpassword@localhost:5432/voiceai_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: test-secret-key-minimum-32-characters-long
      ENCRYPTION_KEY: dGVzdC1mZXJuZXQta2V5LTQ0LWNoYXJzLWJhc2U2NG9rPQ==
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: apps/api

      - name: Run migrations
        run: alembic upgrade head
        working-directory: apps/api

      - name: Run tests
        run: pytest -x -v --cov=app --cov-report=xml --cov-report=term-missing
        working-directory: apps/api

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: python
        if: always()

  # ─── TypeScript: Lint ─────────────────────────────────────────────────────────
  lint-typescript:
    name: Lint TypeScript (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint --workspace=apps/web

      - name: Lint shared package
        run: npm run lint --workspace=packages/shared
        continue-on-error: true  # shared package may not have lint script yet

  # ─── TypeScript: Type Check ───────────────────────────────────────────────────
  typecheck-typescript:
    name: Type Check TypeScript (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check web app
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Type check shared package
        run: npx tsc --noEmit
        working-directory: packages/shared

  # ─── TypeScript: Tests ───────────────────────────────────────────────────────
  test-typescript:
    name: Test TypeScript (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/web -- --ci --coverage
        env:
          CI: true

  # ─── Docker: Build ───────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-python, typecheck-python, lint-typescript, typecheck-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: voiceai-api:${{ github.sha }}

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: voiceai-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://yourdomain.com/api
            NEXT_PUBLIC_WS_URL=wss://yourdomain.com/ws
