version: "3.9"

x-api-common: &api-common
  build:
    context: ./apps/api
    dockerfile: Dockerfile
  image: voiceai-api:latest
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - internal
    - public

services:
  # ─── Application Services ────────────────────────────────────────────────────

  api:
    <<: *api-common
    container_name: voiceai_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: voiceai-web:latest
    container_name: voiceai_web
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  celery_worker:
    <<: *api-common
    container_name: voiceai_celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q default,calls,memory
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  celery_beat:
    <<: *api-common
    container_name: voiceai_celery_beat
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    # Only one beat instance should ever run — no restart loop on intentional stop
    restart: unless-stopped

  # ─── Data Services ────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: voiceai_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200

  redis:
    image: redis:7-alpine
    container_name: voiceai_redis
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --appendfsync everysec

  # ─── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: voiceai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount certs here when using real TLS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - public
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────

networks:
  # Isolated backend network — postgres/redis not exposed to nginx
  internal:
    driver: bridge
    internal: true

  # Public-facing network for nginx, web, and api
  public:
    driver: bridge
